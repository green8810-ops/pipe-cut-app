<!doctype html>
<html lang="ja">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>パイプカット計算アプリ</title>
  <style>
    :root{--bg:#f6f7f9;--card:#fff;--text:#17202a;--muted:#667085;--line:#d0d5dd;--accent:#1d4ed8;--ok:#047857;--warn:#b45309;--danger:#b42318;}
    *{box-sizing:border-box} body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;background:var(--bg);color:var(--text);}
    header{background:#111827;color:#fff;padding:18px 16px;} header h1{font-size:20px;margin:0 0 5px;} header p{margin:0;color:#d1d5db;font-size:13px;}
    main{max-width:980px;margin:0 auto;padding:16px;} .card{background:var(--card);border:1px solid var(--line);border-radius:14px;padding:14px;margin-bottom:14px;box-shadow:0 1px 2px #0000000d;}
    h2{font-size:17px;margin:0 0 12px;} label{display:block;font-size:13px;font-weight:700;margin-bottom:5px;} input{width:100%;padding:12px;border:1px solid var(--line);border-radius:10px;font-size:16px;background:#fff;}
    .grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;} .row{display:grid;grid-template-columns:1.3fr 1fr 48px;gap:8px;align-items:end;margin-bottom:8px;}
    button{border:0;border-radius:10px;padding:12px 14px;font-weight:800;font-size:15px;cursor:pointer;} .primary{background:var(--accent);color:#fff;width:100%;} .secondary{background:#e5e7eb;color:#111827;} .danger{background:#fee4e2;color:var(--danger);height:46px;} .actions{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:12px;}
    table{width:100%;border-collapse:collapse;font-size:14px;} th,td{border-bottom:1px solid var(--line);padding:9px;text-align:left;vertical-align:top;} th{background:#f9fafb;} .summary{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;} .metric{border:1px solid var(--line);border-radius:12px;padding:12px;background:#f9fafb;} .metric b{display:block;font-size:22px;margin-top:4px;} .muted{color:var(--muted);font-size:12px;} .pill{display:inline-block;background:#eef2ff;color:#3730a3;border-radius:999px;padding:3px 8px;margin:2px;font-size:12px;font-weight:700;} .waste{color:var(--warn);font-weight:800}.ok{color:var(--ok);font-weight:800}.err{color:var(--danger);font-weight:800;margin-top:8px}.hide{display:none}
    @media(max-width:720px){.grid,.summary{grid-template-columns:1fr}.row{grid-template-columns:1.2fr .8fr 44px}.actions{grid-template-columns:1fr} main{padding:10px}.card{border-radius:12px}}
    @media print{header,.no-print,.card.input-card{display:none} body{background:#fff} main{max-width:none}.card{box-shadow:none;border:0}.hide{display:block}}
  </style>
</head>
<body>
<header>
  <h1>パイプカット計算アプリ</h1>
  <p>定尺から必要本数と切断割り付けを自動計算します</p>
</header>
<main>
  <section class="card input-card">
    <h2>基本設定</h2>
    <div class="grid">
      <div><label>材料名</label><input id="material" placeholder="例：角パイプ 50×50" value="角パイプ"></div>
      <div><label>定尺長さ mm</label><input id="stock" type="number" value="5500"></div>
      <div><label>切り代 mm</label><input id="kerf" type="number" value="3"></div>
    </div>
  </section>

  <section class="card input-card">
    <h2>カット寸法</h2>
    <div id="items"></div>
    <div class="actions no-print">
      <button class="secondary" onclick="addRow()">＋ 寸法を追加</button>
      <button class="secondary" onclick="loadSample()">サンプル入力</button>
    </div>
    <div class="actions no-print">
      <button class="primary" onclick="calculate()">計算する</button>
      <button class="secondary" onclick="window.print()">印刷 / PDF保存</button>
    </div>
    <div id="error" class="err"></div>
  </section>

  <section id="result" class="card hide">
    <h2>計算結果</h2>
    <p class="muted" id="printInfo"></p>
    <div class="summary">
      <div class="metric">必要定尺本数 <b id="bars">-</b></div>
      <div class="metric">総端材 <b id="waste">-</b></div>
      <div class="metric">歩留まり <b id="yield">-</b></div>
    </div>
    <h2 style="margin-top:18px">割り付け表</h2>
    <div style="overflow-x:auto"><table id="planTable"></table></div>
    <h2 style="margin-top:18px">入力明細</h2>
    <div style="overflow-x:auto"><table id="inputTable"></table></div>
  </section>
</main>
<script>
const items = document.getElementById('items');
function addRow(length='', qty=''){
  const row=document.createElement('div'); row.className='row';
  row.innerHTML=`<div><label>長さ mm</label><input class="len" type="number" min="1" value="${length}" placeholder="例：1200"></div>
  <div><label>本数</label><input class="qty" type="number" min="1" value="${qty}" placeholder="例：4"></div>
  <button class="danger" onclick="this.parentElement.remove()">×</button>`;
  items.appendChild(row);
}
function loadSample(){ items.innerHTML=''; addRow(1200,4); addRow(900,3); addRow(750,6); calculate(); }
function mm(n){ return Math.round(n).toLocaleString()+' mm'; }
function calculate(){
  const error=document.getElementById('error'); error.textContent='';
  const material=document.getElementById('material').value || '材料';
  const stock=Number(document.getElementById('stock').value); const kerf=Number(document.getElementById('kerf').value||0);
  if(!stock || stock<=0){ error.textContent='定尺長さを入力してください。'; return; }
  const parts=[]; const summary=[];
  document.querySelectorAll('.row').forEach(r=>{
    const len=Number(r.querySelector('.len').value); const qty=Number(r.querySelector('.qty').value);
    if(len>0 && qty>0){ summary.push({len,qty}); for(let i=0;i<qty;i++) parts.push(len); }
  });
  if(parts.length===0){ error.textContent='カット寸法を1つ以上入力してください。'; return; }
  const tooLong=parts.find(p=>p>stock); if(tooLong){ error.textContent=`${tooLong}mm は定尺 ${stock}mm より長いため切れません。`; return; }
  parts.sort((a,b)=>b-a); // First Fit Decreasing
  const bars=[];
  parts.forEach(p=>{
    let best=-1, bestRemain=Infinity;
    for(let i=0;i<bars.length;i++){
      const used = bars[i].cuts.reduce((s,x)=>s+x,0) + kerf * Math.max(0,bars[i].cuts.length);
      const after = used + p;
      const remain = stock - after;
      if(remain>=0 && remain<bestRemain){ best=i; bestRemain=remain; }
    }
    if(best===-1) bars.push({cuts:[p]}); else bars[best].cuts.push(p);
  });
  let totalCut=parts.reduce((s,x)=>s+x,0); let totalStock=bars.length*stock; let totalKerf=0; let totalWaste=0;
  const rows=bars.map((b,i)=>{
    const kerfs=kerf*Math.max(0,b.cuts.length-1); totalKerf+=kerfs;
    const used=b.cuts.reduce((s,x)=>s+x,0)+kerfs; const rem=stock-used; totalWaste+=rem;
    return `<tr><td>${i+1}本目</td><td>${b.cuts.map(c=>`<span class="pill">${c}mm</span>`).join('')}</td><td>${mm(kerfs)}</td><td class="waste">${mm(rem)}</td></tr>`;
  }).join('');
  document.getElementById('result').classList.remove('hide');
  document.getElementById('bars').textContent=bars.length+' 本';
  document.getElementById('waste').textContent=mm(totalWaste);
  document.getElementById('yield').textContent=((totalCut/totalStock)*100).toFixed(1)+'%';
  document.getElementById('printInfo').textContent=`材料：${material} / 定尺：${stock}mm / 切り代：${kerf}mm / 作成日：${new Date().toLocaleDateString('ja-JP')}`;
  document.getElementById('planTable').innerHTML=`<thead><tr><th>定尺</th><th>切断寸法</th><th>切り代合計</th><th>余り</th></tr></thead><tbody>${rows}</tbody>`;
  document.getElementById('inputTable').innerHTML='<thead><tr><th>寸法</th><th>本数</th></tr></thead><tbody>'+summary.map(s=>`<tr><td>${s.len}mm</td><td>${s.qty}本</td></tr>`).join('')+'</tbody>';
}
addRow(); addRow(); addRow();
</script>
</body>
</html>
